<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Allowed Web Panel</title>
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #141E30, #243B55);
  color: #fff;
  text-align: center;
  padding: 20px;
  min-height: 100vh;
}
h1 {
  margin-bottom: 20px;
  color: #00ffe0;
  text-shadow: 0 0 15px #00ffe0;
  font-size: 2.2em;
  letter-spacing: 1px;
}
.commit-info {
  margin-bottom: 20px;
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.9em;
}
.form {
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}
input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  min-width: 180px;
  background: rgba(255,255,255,0.2);
  color: #fff;
}
input::placeholder {
  color: #ccc;
}
button {
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #00ffe0, #00bcd4);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  transform: scale(1.05);
  background: linear-gradient(135deg, #00cfcf, #0097a7);
}
.table-container {
  margin-top: 25px;
  overflow-x: auto;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 15px;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px;
}
th, td {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
th {
  color: #00ffe0;
  font-size: 1.1em;
}
td img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(0,255,224,0.6);
}
.url-cell {
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
a {
  color: #00ffe0;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
.actions button {
  margin: 0 4px;
  padding: 6px 12px;
  font-size: 0.9em;
  border-radius: 8px;
  color: #fff;
}
.actions button.edit {
  background: #ffa000;
}
.actions button.delete {
  background: #ff4081;
}
.loading {
  display: none;
  color: #00ffe0;
  margin-top: 10px;
}
.error {
  color: #ff4081;
  margin-top: 10px;
}
.success {
  color: #76ff03;
  margin-top: 10px;
}
</style>
</head>
<body>
<h1>⚡ Allowed Web Panel</h1>
<div id="commit-info" class="commit-info">Loading commit info...</div>

<div class="form">
  <input type="text" id="title" placeholder="Title">
  <input type="url" id="url" placeholder="URL">
  <input type="text" id="icon" placeholder="Icon URL">
  <input type="file" id="iconFile" accept="image/*">
  <button onclick="addItem()">➕ Add</button>
</div>

<div id="status" class="loading"></div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Icon</th>
        <th>Title</th>
        <th>URL</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
</div>

<script>
const repo = "Ron015/API-EXAMPLE";
const path = "allowed.json";
const token = "";

let items = [];
let currentSha = null;

function showStatus(msg, type="loading") {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = type;
  el.style.display = "block";
  if(type!=="loading") setTimeout(()=>el.style.display="none",3000);
}

function hideStatus(){ document.getElementById("status").style.display="none"; }
function truncateUrl(url,max=30){return url.length<=max?url:url.substring(0,max-3)+'...';}

async function getCommitInfo(){
  try{
    const res = await fetch(`https://api.github.com/repos/${repo}/commits?path=${path}&per_page=1`,{headers:{Authorization:`token ${token}`}});
    if(!res.ok) throw new Error(res.status);
    const commits = await res.json();
    if(commits.length===0){document.getElementById('commit-info').innerHTML='No commits yet'; return;}
    const c=commits[0];
    const date=new Date(c.commit.author.date).toLocaleString();
    document.getElementById('commit-info').innerHTML=`Last updated: ${date} by ${c.commit.author.name}`;
  }catch(e){console.error(e);document.getElementById('commit-info').innerHTML='Error loading commit info';}
}

async function fetchData() {
  try{
    showStatus("Loading data from GitHub...","loading");
    const fileRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`token ${token}`}});
    if(!fileRes.ok){ 
      if(fileRes.status===404){ items=[]; renderTable(); hideStatus(); getCommitInfo(); return;}
      throw new Error(fileRes.status);
    }
    const fileData = await fileRes.json();
    currentSha=fileData.sha;
    const content = atob(fileData.content);
    items = content.trim()?JSON.parse(content):[];
    renderTable(); hideStatus(); getCommitInfo();
  }catch(e){console.error(e); items=[]; renderTable(); showStatus("❌ Error loading data","error"); getCommitInfo();}
}

function renderTable(){
  const tbody=document.getElementById("table-body");
  tbody.innerHTML="";
  if(items.length===0){
    tbody.innerHTML=`<tr><td colspan="4" style="text-align:center;padding:20px;">No items yet. Add some using the form above.</td></tr>`;
    return;
  }
  items.forEach((b,i)=>{
    tbody.innerHTML+=`<tr>
      <td>${b.icon?`<img src="${b.icon}" alt="icon">`:"❌"}</td>
      <td>${b.title}</td>
      <td class="url-cell"><a href="${b.url}" target="_blank" title="${b.url}">${truncateUrl(b.url)}</a></td>
      <td class="actions">
        <button class="edit" onclick="editItem(${i})">✏️ Edit</button>
        <button class="delete" onclick="deleteItem(${i})">🗑️ Delete</button>
      </td>
    </tr>`;
  });
}

async function uploadIcon(file){
  return new Promise((resolve,reject)=>{
    showStatus("Uploading icon...","loading");
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const base64Content=reader.result.split(',')[1];
        const fileName=`ICONS/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.-]/g,'_')}`;
        let sha=null;
        try{
          const checkRes=await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`,{headers:{Authorization:`token ${token}`}});
          if(checkRes.ok){const fileData=await checkRes.json(); sha=fileData.sha;}
        }catch{}
        const uploadRes=await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`,{
          method:"PUT",
          headers:{Authorization:`token ${token}`, "Content-Type":"application/json"},
          body:JSON.stringify({message:`Upload icon: ${file.name}`, content:base64Content, sha:sha})
        });
        if(!uploadRes.ok){const e=await uploadRes.json(); throw new Error(e.message||"Upload failed");}
        const rawUrl=`https://raw.githubusercontent.com/${repo}/main/${fileName}`;
        showStatus("✅ Icon uploaded successfully!","success");
        resolve(rawUrl);
      }catch(err){console.error(err); showStatus(`❌ Failed to upload icon: ${err.message}`,"error"); reject(err);}
    };
    reader.onerror=()=>reject(new Error("Failed to read file"));
    reader.readAsDataURL(file);
  });
}

async function deleteIconFromGitHub(iconUrl) {
  if (!iconUrl || !iconUrl.includes('raw.githubusercontent.com')) return;
  
  try {
    const fileName = iconUrl.split('/main/')[1];
    const fileRes = await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
      headers: { Authorization: `token ${token}` }
    });
    
    if (fileRes.ok) {
      const fileData = await fileRes.json();
      await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
        method: "DELETE",
        headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify({ 
          message: `Delete icon: ${fileName}`, 
          sha: fileData.sha 
        })
      });
    }
  } catch (e) {
    console.error("Failed to delete icon:", e);
  }
}

async function saveToGitHub(){
  try{
    showStatus("Saving to GitHub...","loading");
    const updatedContent=JSON.stringify(items,null,2);
    const encoded=btoa(unescape(encodeURIComponent(updatedContent)));
    const saveRes=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
      method:"PUT",
      headers:{Authorization:`token ${token}`, "Content-Type":"application/json"},
      body:JSON.stringify({message:"Update allowed.json from Allowed Web Panel", content:encoded, sha:currentSha})
    });
    if(!saveRes.ok){const e=await saveRes.json(); throw new Error(e.message||"Save failed");}
    const data=await saveRes.json();
    currentSha=data.content.sha;
    showStatus("✅ Data Saved to GitHub!","success");
    getCommitInfo();
  }catch(e){console.error(e); showStatus(`❌ Failed to save: ${e.message}`,"error");}
}

async function addItem(){
  const title=document.getElementById("title").value.trim();
  const url=document.getElementById("url").value.trim();
  const iconUrl=document.getElementById("icon").value.trim();
  const file=document.getElementById("iconFile").files[0];
  if(!title||!url){showStatus("⚠️ Please fill Title and URL","error"); return;}
  try{
    showStatus("Adding item...","loading");
    let finalIcon=iconUrl;
    if(file) finalIcon=await uploadIcon(file);
    items.push({title,url,icon:finalIcon});
    renderTable();
    document.getElementById("icon").value="";
    document.getElementById("title").value="";
    document.getElementById("url").value="";
    document.getElementById("iconFile").value="";
    await saveToGitHub();
  }catch(e){console.error(e); showStatus("❌ Failed to add item","error");}
}

async function deleteItem(i){
  if(confirm("Are you sure you want to delete this item?")){
    const itemToDelete = items[i];
    if (itemToDelete.icon && itemToDelete.icon.includes('raw.githubusercontent.com')) {
      await deleteIconFromGitHub(itemToDelete.icon);
    }
    items.splice(i,1);
    renderTable();
    await saveToGitHub();
  }
}

async function editItem(i){
  const b=items[i];
  const oldIcon = b.icon;
  document.getElementById("icon").value=b.icon||"";
  document.getElementById("title").value=b.title;
  document.getElementById("url").value=b.url;
  items.splice(i,1);
  renderTable();
  showStatus("Editing item...","loading");
  
  const title=document.getElementById("title").value.trim();
  const url=document.getElementById("url").value.trim();
  const iconUrl=document.getElementById("icon").value.trim();
  const file=document.getElementById("iconFile").files[0];
  
  if(!title||!url){
    showStatus("⚠️ Please fill Title and URL","error");
    items.splice(i,0,b);
    renderTable();
    return;
  }
  
  try{
    let finalIcon=iconUrl;
    if(file) {
      finalIcon=await uploadIcon(file);
      if (oldIcon && oldIcon.includes('raw.githubusercontent.com')) {
        await deleteIconFromGitHub(oldIcon);
      }
    }
    items.push({title,url,icon:finalIcon});
    renderTable();
    document.getElementById("icon").value="";
    document.getElementById("title").value="";
    document.getElementById("url").value="";
    document.getElementById("iconFile").value="";
    await saveToGitHub();
  }catch(e){
    console.error(e); 
    showStatus("❌ Failed to edit item","error");
    items.splice(i,0,b);
    renderTable();
  }
}

setInterval(async ()=>{
  try{
    const res=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{headers:{Authorization:`token ${token}`}});
    if(!res.ok) return;
    const data=await res.json();
    if(data.sha!==currentSha){
      currentSha=data.sha;
      const content=atob(data.content);
      items=content.trim()?JSON.parse(content):[];
      renderTable();
      getCommitInfo();
    }
  }catch(e){console.error("❌ Auto-fetch error:",e);}
},60000);

fetchData();
</script>
</body>
</html>
